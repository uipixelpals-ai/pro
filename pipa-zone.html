   <script>
        let canvas;
        function initCanvas() {
            if (canvas) return; // biar ga double init

            canvas = new fabric.Canvas('drawingCanvas', {
                isDrawingMode: true,
                width: 1554,
                height: 979,
                backgroundColor: 'white'
            });

            canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
            canvas.freeDrawingBrush.width = 15;
            canvas.freeDrawingBrush.color = "#000000";

            canvas.calcOffset(); // penting kalau ada scale / transform
        }
        // Profile Navigation - New Design
        const profilesNew = document.querySelectorAll('.profile-img-new');
        const btnPrevNew = document.getElementById('btnPrevNew');
        const btnNextNew = document.getElementById('btnNextNew');
        let currentIndexNew = 0;


        function showProfileNew(newIndex, direction) {
            if (newIndex === currentIndexNew) return;
            
            const currentProfile = profilesNew[currentIndexNew];
            const newProfile = profilesNew[newIndex];

            // Hide current
            currentProfile.style.display = 'none';
            currentProfile.classList.remove('active');
            
            // Show new
            newProfile.style.display = 'block';
            newProfile.classList.add('active');
            
            currentIndexNew = newIndex;
        }

        if (btnNextNew) {
            btnNextNew.addEventListener('click', () => {
                const newIndex = (currentIndexNew + 1) % profilesNew.length;
                showProfileNew(newIndex, 'next');
            });
        }

        if (btnPrevNew) {
            btnPrevNew.addEventListener('click', () => {
                const newIndex = (currentIndexNew - 1 + profilesNew.length) % profilesNew.length;
                showProfileNew(newIndex, 'prev');
            });
        }

        // Name Input - New Design with Confirm Popup
        const nameInputNew = document.getElementById('nameInputNew');
        const confirmPopupName = document.getElementById('confirmPopupName');
        const confirmNameYes = document.getElementById('confirmNameYes');
        const confirmNameNo = document.getElementById('confirmNameNo');
        
        if (nameInputNew) {
            nameInputNew.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && nameInputNew.value.trim() !== '') {
                    confirmPopupName.style.display = 'flex';
                }
            });

            nameInputNew.addEventListener('blur', () => {
                if (nameInputNew.value.trim() !== '' && !nameInputNew.disabled) {
                    confirmPopupName.style.display = 'flex';
                }
            });
        }

        if (confirmNameYes) {
            confirmNameYes.addEventListener('click', () => {
                const savedName = nameInputNew.value.trim();
                nameInputNew.disabled = true;
                nameInputNew.placeholder = savedName;
                nameInputNew.value = '';
                nameInputNew.style.color = '#FFFFFF';
                nameInputNew.style.fontStyle = 'normal';
                nameInputNew.style.fontWeight = '700';
                nameInputNew.style.textShadow = '0 0 10px rgba(255,255,255,0.8)';
                // Force placeholder to be white using CSS custom property
                nameInputNew.setAttribute('style', nameInputNew.getAttribute('style') + ';');
                // Add a style element for placeholder
                const styleEl = document.createElement('style');
                styleEl.textContent = '.name-input-new::placeholder { color: #FFFFFF !important; font-weight: 700 !important; text-shadow: 0 0 10px rgba(255,255,255,0.8) !important; }';
                document.head.appendChild(styleEl);
                confirmPopupName.style.display = 'none';
            });
        }

        if (confirmNameNo) {
            confirmNameNo.addEventListener('click', () => {
                confirmPopupName.style.display = 'none';
                nameInputNew.focus();
            });
        }

        // Navbar Navigation - Page Switching
        const navItems = document.querySelectorAll('.nav-segment');
        const pageSections = document.querySelectorAll('.page-section');

        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                
                const targetPage = item.getAttribute('data-nav');
                
                // Remove active from all nav items
                navItems.forEach(n => n.classList.remove('active'));
                
                // Add active to clicked
                item.classList.add('active');
                
                // Switch pages
                pageSections.forEach(page => {
                    page.classList.remove('active');
                    if (page.getAttribute('data-page') === targetPage) {
                        page.classList.add('active');
                    }
                });
            });
        });

        // Name Input Logic
        const nameInput = document.getElementById('nameInput');
        const confirmPopup = document.getElementById('confirmPopup');
        const confirmYes = document.getElementById('confirmYes');
        const confirmNo = document.getElementById('confirmNo');

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && nameInput.value.trim() !== '') {
                confirmPopup.classList.add('show');
            }
        });

        nameInput.addEventListener('blur', () => {
            if (nameInput.value.trim() !== '') {
                confirmPopup.classList.add('show');
            }
        });

        confirmYes.addEventListener('click', () => {
            nameInput.disabled = true;
            nameInput.placeholder = nameInput.value.trim();
            nameInput.value = '';
            confirmPopup.classList.remove('show');
        });

        confirmNo.addEventListener('click', () => {
            nameInput.value = '';
            nameInput.focus();
            confirmPopup.classList.remove('show');
        });

        // Draw Section Transition
        const drawBoxes = document.querySelectorAll('.draw-box');

        // Carousel System
        const navOrder = ['profile', 'draw', 'stopmotion', 'gallery', 'vote', 'leaderboard'];
        let currentSlideIndex = 0;
        let isTransitioning = false;

       function goToSlide(targetIndex) {
            if (isTransitioning || targetIndex === currentSlideIndex) return;
            isTransitioning = true;

            const slides = document.querySelectorAll('.page-section');

            slides[currentSlideIndex].classList.remove('active');
            slides[targetIndex].classList.add('active');

            currentSlideIndex = targetIndex;

            document.querySelectorAll('.nav-segment').forEach((item, i) => {
                item.classList.toggle('active', i === targetIndex);
            });

            if (targetIndex === 1) {
                setTimeout(() => {
                    canvas.calcOffset();
                }, 100);
            }

            if (targetIndex === 0) {
                setTimeout(updateDrawBoxIndicators, 350);
            }

            setTimeout(() => {
                isTransitioning = false;
            }, 300);
        }

        function goToSlideByNav(navName) {
            const targetIndex = navOrder.indexOf(navName);
            if (targetIndex === -1) return;
            goToSlide(targetIndex);
        }

        // Draw boxes click handler
        drawBoxes.forEach(box => {
            box.addEventListener('click', () => {
                goToSlideByNav('draw');
            });
        });

        // Navbar click handlers
        document.querySelectorAll('.nav-segment').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const nav = e.target.dataset.nav;
                goToSlideByNav(nav);
            });
        });

    document.addEventListener("DOMContentLoaded", function() {
        
        // 1. Inisialisasi Fabric Canvas
        let canvas;

        canvas = new fabric.Canvas('drawingCanvas', {
            isDrawingMode: true
        });

        canvas.calcOffset();
        let currentSize = 15;
        let currentColor = "#000000";
        let redoStack = [];
        let isStrokeMode = false;

        // Default Brush
        canvas.freeDrawingBrush = new fabric.PencilBrush(canvas);
        canvas.freeDrawingBrush.width = currentSize;
        canvas.freeDrawingBrush.color = currentColor;

        // Helper: Update UI Button State
        function setActiveButton(id) {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Helper: Update Color & Indicators
        function updateGlobalColor(color) {
            currentColor = color;
            canvas.freeDrawingBrush.color = color;
            document.getElementById('brushIndicator').style.background = color;
            
            const activeObj = canvas.getActiveObject();
            if (activeObj) {
                if (isStrokeMode && activeObj.type === 'rect') {
                    activeObj.set({ stroke: color });
                } else {
                    activeObj.set({ fill: color });
                }
                canvas.renderAll();
            }
        }

        // --- LOGIKA TOOLS ---

        // Brush Tool
        document.getElementById('btnBrush').addEventListener('click', () => {
            setActiveButton('btnBrush');
            canvas.isDrawingMode = true;
            canvas.freeDrawingBrush.color = currentColor;
        });

        // Eraser Tool
        document.getElementById('btnEraser').addEventListener('click', () => {
            setActiveButton('btnEraser');
            canvas.isDrawingMode = true;
            canvas.freeDrawingBrush.color = "#ffffff";
        });

        // Rectangle Tool
        document.getElementById('btnRect').addEventListener('click', () => {
            setActiveButton('btnRect');
            canvas.isDrawingMode = false;
            const rect = new fabric.Rect({
                left: 200, top: 200,
                width: 300, height: 200,
                fill: isStrokeMode ? 'transparent' : currentColor,
                stroke: isStrokeMode ? currentColor : null,
                strokeWidth: isStrokeMode ? currentSize : 0,
                cornerSize: 20,
                cornerColor: '#1D47F5'
            });
            canvas.add(rect);
            canvas.setActiveObject(rect);
        });

        // Text Tool
        document.getElementById('btnText').addEventListener('click', () => {
            setActiveButton('btnText');
            canvas.isDrawingMode = false;
            const text = new fabric.IText('Teks Baru', {
                left: 200, top: 200,
                fill: currentColor,
                fontSize: currentSize * 3
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        });

        // Stroke Toggle Logic (ON/OFF)
        const strokeBtn = document.getElementById('btnStrokeToggle');
        strokeBtn.addEventListener('click', () => {
            isStrokeMode = !isStrokeMode;
            if (isStrokeMode) {
                strokeBtn.style.borderColor = "#D0FE54"; // Hijau saat aktif
                strokeBtn.innerText = "STROKE ON";
            } else {
                strokeBtn.style.borderColor = "black"; // Hitam saat mati
                strokeBtn.innerText = "STROKE OFF";
            }
        });

        // Central Color Picker
        const centralBtn = document.getElementById('btnCentralColor');
        const colorInput = document.getElementById('hiddenColorPicker');
        centralBtn.addEventListener('click', () => colorInput.click());
        colorInput.addEventListener('input', (e) => updateGlobalColor(e.target.value));

        // Palette Click
        document.querySelectorAll('.color-pick:not(#btnCentralColor)').forEach(p => {
            p.addEventListener('click', function() {
                updateGlobalColor(window.getComputedStyle(this).backgroundColor);
            });
        });

        // Undo & Redo
        document.getElementById('btnUndo').addEventListener('click', () => {
            const objects = canvas.getObjects();
            if (objects.length > 0) {
                redoStack.push(objects.pop());
                canvas.remove(redoStack[redoStack.length - 1]);
            }
        });

        document.getElementById('btnRedo').addEventListener('click', () => {
            if (redoStack.length > 0) {
                canvas.add(redoStack.pop());
            }
        });

        // Slider Size Sync
        document.getElementById('brushSlider').addEventListener('input', function() {
            currentSize = parseInt(this.value);
            canvas.freeDrawingBrush.width = currentSize;
            const ind = document.getElementById('brushIndicator');
            ind.style.width = (currentSize/1.5 + 5) + "px";
            ind.style.height = (currentSize/1.5 + 5) + "px";
        });

        // Fix Coordinate Offset (Karena transform: scale)
        canvas.on('mouse:down', () => canvas.calcOffset());

        // Save Image
        document.getElementById('btnSave').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'gartic-drawing.png';
            link.href = canvas.toDataURL({ format: 'png' });
            link.click();
        });
    });

        // Handle draw box click for delete in profile
        document.querySelectorAll('.draw-box').forEach((box, index) => {
            box.style.cursor = 'pointer';
            
            box.addEventListener('click', () => {
                const currentSrc = box.src;
                const hasDrawing = currentSrc && !currentSrc.includes('draw-box.png');
                
                if (hasDrawing) {
                    // Show delete confirmation popup
                    const deleteConfirm = document.getElementById('deleteConfirm');
                    if (!deleteConfirm) {
                        createDeleteConfirmPopup();
                    }
                    
                    document.getElementById('deleteSlotNum').textContent = index + 1;
                    deleteSlotIndex = index;
                    document.getElementById('deleteConfirm').classList.add('show');
                }
            });
        });

        let deleteSlotIndex = -1;

        function createDeleteConfirmPopup() {
            const popup = document.createElement('div');
            popup.id = 'deleteConfirm';
            popup.className = 'save-popup';
            popup.innerHTML = `
                <button class="close-popup" onclick="document.getElementById('deleteConfirm').classList.remove('show')">×</button>
                <h3>Delete Drawing?</h3>
                <p>Slot <span id="deleteSlotNum"></span></p>
                <div class="save-confirm-btns">
                    <button class="yes-btn" id="confirmDeleteYes">Yes</button>
                    <button class="no-btn" id="confirmDeleteNo">No</button>
                </div>
            `;
            document.body.appendChild(popup);
            
            document.getElementById('confirmDeleteYes').addEventListener('click', () => {
                if (deleteSlotIndex >= 0) {
                    const drawBoxes = document.querySelectorAll('.draw-box');
                    drawBoxes[deleteSlotIndex].src = 'PAGE_1/draw-box.png';
                    localStorage.removeItem('drawBox' + (deleteSlotIndex + 1));
                    updateDrawBoxIndicators();
                    document.getElementById('deleteConfirm').classList.remove('show');
                    showToast('Slot ' + (deleteSlotIndex + 1) + ' deleted!');
                }
            });
            
            document.getElementById('confirmDeleteNo').addEventListener('click', () => {
                document.getElementById('deleteConfirm').classList.remove('show');
            });
        }

        // Load saved drawings on page load & initialize
        window.addEventListener('load', () => {
            // Load saved drawings
            for (let i = 1; i <= 3; i++) {
                const savedDraw = localStorage.getItem('drawBox' + i);
                if (savedDraw) {
                    const drawBoxes = document.querySelectorAll('.draw-box');
                    if (drawBoxes[i-1]) {
                        drawBoxes[i-1].src = savedDraw;
                    }
                }
            }
            
            // Update indicators
            setTimeout(updateDrawBoxIndicators, 100);
            
            // Go to profile slide initially
            goToSlide(0);
        });

        // Update draw box indicators on slide change
        function updateDrawBoxIndicators() {
            document.querySelectorAll('.draw-box').forEach((box, index) => {
                const src = box.src;
                if (src && !src.includes('draw-box.png')) {
                    box.style.outline = '3px solid #1D47F5';
                } else {
                    box.style.outline = 'none';
                }
            });
        }

        function checkAndInitCanvas() {
            const drawSlide = document.querySelector('.carousel-slide[data-slide="draw"]');
            if (drawSlide && drawSlide.classList.contains('active')) {
                console.log('Draw slide is active, initializing canvas...');
                setTimeout(initCanvas, 200);
            }
        }

        // Check on navbar clicks
        document.querySelectorAll('.nav-segment').forEach(item => {
            item.addEventListener('click', () => {
                setTimeout(checkAndInitCanvas, 400);
            });
        });

        // Gallery Layer Switcher Logic
        const galleryContainer = document.getElementById('galleryContainer');
        const layerStopmotion = document.querySelector('.layer-stopmotion');
        const layerDraw = document.querySelector('.layer-draw');
        let isDrawOnTop = true;

        function swapGalleryLayers() {
            isDrawOnTop = !isDrawOnTop;
            
            if (isDrawOnTop) {
                layerDraw.style.zIndex = '20';
                layerStopmotion.style.zIndex = '10';
            } else {
                layerDraw.style.zIndex = '10';
                layerStopmotion.style.zIndex = '20';
            }
        }

        // Handle click on stopmotion layer - when draw is on top and stopmotion area is visible
        if (layerStopmotion) {
            layerStopmotion.addEventListener('click', function(e) {
                if (isDrawOnTop) {
                    console.log('Click on Stopmotion visible area - swapping layers');
                    swapGalleryLayers();
                }
            });
        }

        // Handle click on draw layer - when stopmotion is on top and draw area is visible
        if (layerDraw) {
            layerDraw.addEventListener('click', function(e) {
                if (!isDrawOnTop) {
                    console.log('Click on Draw visible area - swapping layers back');
                    swapGalleryLayers();
                }
            });
        }

        // Player name click handler - toggle green background
        document.querySelectorAll('.player-box').forEach(box => {
            box.setAttribute('data-original-bg', box.style.background || 'white');
        });

        function selectPlayer(row) {
            // Get all boxes for this row
            var boxes = document.querySelectorAll('.player-box[data-row="' + row + '"]');
            
            // Remove selected from all names
            document.querySelectorAll('.player-name').forEach(n => {
                n.classList.remove('selected');
            });
            
            // Reset all boxes to original background
            document.querySelectorAll('.player-box').forEach(b => {
                var originalBg = b.getAttribute('data-original-bg');
                b.style.background = originalBg || 'white';
            });
            
            // Select this row - set to green
            var playerName = document.querySelector('.player-name[data-row="' + row + '"]');
            if (playerName) {
                playerName.classList.add('selected');
            }
            boxes.forEach(function(box) {
                box.style.background = '#D0FE54';
            });
            
            // Change gallery content randomly when player is selected
            updateGalleryContent();
            
            console.log('Clicked row:', row, 'player:', playerName ? playerName.textContent.trim() : 'unknown');
        }

        // Function to update gallery content with random images/videos
        function updateGalleryContent() {
            // Define image sources for draw layer
            var drawImages = [
                'img/gallery/g1.png',
                'img/gallery/g2.png', 
                'img/gallery/g3.png',
                'img/gallery/g4.png'
            ];
            
            // Define video sources for stopmotion layer
            var stopmotionVideos = [
                'vid/sm1.webm',
                'vid/sm2.webm',
                'vid/sm3.webm', 
                'vid/sm4.webm'
            ];
            
            // Get random indices for each position
            var randomIndices = [];
            for (var i = 0; i < 4; i++) {
                randomIndices.push(Math.floor(Math.random() * 4));
            }
            
            // Update draw layer images (foreground)
            var drawImgs = document.querySelectorAll('#drawMode img');
            drawImgs.forEach(function(img, index) {
                if (randomIndices[index] !== undefined) {
                    img.src = drawImages[randomIndices[index]];
                }
            });
            
            // Update stopmotion videos (background)
            var stopmotionVideosElements = document.querySelectorAll('#stopMode video');
            stopmotionVideosElements.forEach(function(video, index) {
                if (randomIndices[index] !== undefined) {
                    // Reset video to first frame and change source
                    video.pause();
                    video.currentTime = 0;
                    video.src = stopmotionVideos[randomIndices[index]];
                    // Note: Video will start playing only when user clicks play button
                }
            });
        }

        // Stopmotion video play/pause function
        function toggleVideo(videoId) {
            var video = document.getElementById(videoId);
            if (!video) {
                console.log('Video element not found:', videoId);
                return;
            }
            
            // Log current state for debugging
            console.log('Video toggle - ID:', videoId, 
                       'paused:', video.paused, 
                       'ended:', video.ended, 
                       'loop:', video.loop,
                       'currentTime:', video.currentTime,
                       'duration:', video.duration);
            
            // Check if video is currently playing (not paused and not ended)
            // Note: ended is true when video has finished playing
            var isPlaying = !video.paused && !video.ended;
            console.log('Is playing:', isPlaying);
            
            if (isPlaying) {
                // Video is playing - stop it
                console.log('Stopping video');
                video.pause();
                video.currentTime = 0;
                video.loop = false;
                
                // Show play button
                var btn = document.getElementById('btn-' + videoId);
                if (btn) {
                    btn.style.display = 'block';
                    console.log('Showing play button');
                }
            } else {
                // Video is paused/ended - start it
                console.log('Starting video (looping)');
                video.loop = true;
                video.play().then(function() {
                    console.log('Video play started successfully');
                }).catch(function(error) {
                    console.log('Error playing video:', error);
                });
                
                // Hide play button
                var btn = document.getElementById('btn-' + videoId);
                if (btn) {
                    btn.style.display = 'none';
                    console.log('Hiding play button');
                }
            }
        }
        
        // Profile Stopmotion video play/pause function
        function toggleProfileVideo(videoId) {
            var video = document.getElementById(videoId);
            if (!video) return;
            
            var isPlaying = !video.paused && !video.ended;
            var btn = document.getElementById('btn-' + videoId);
            
            if (isPlaying) {
                video.pause();
                video.currentTime = 0;
                video.loop = false;
                if (btn) btn.style.display = 'block';
            } else {
                video.loop = true;
                video.play();
                if (btn) btn.style.display = 'none';
            }
        }
        
        // Star rating system for vote page
        function toggleStar(rating) {
            var stars = document.querySelectorAll('.star-off, .star-on');
            
            stars.forEach(function(star) {
                var index = parseInt(star.getAttribute('data-index'));
                if (index <= rating) {
                    star.className = 'star-on';
                    star.innerHTML = '<img src="img/vote/star-on.png" alt="Star On" style="width: 250px; height: 250px; cursor: pointer;">';
                } else {
                    star.className = 'star-off';
                    star.innerHTML = '<img src="img/vote/star-off.png" alt="Star Off" style="width: 250px; height: 250px; cursor: pointer;">';
                }
            });
        }
        
        // Vote image navigation
        var voteImages = ['img/gallery/g1.png', 'img/gallery/g2.png', 'img/gallery/g3.png', 'img/gallery/g4.png'];
        var currentVoteImageIndex = 0;
        
        window.nextVoteImage = function() {
            currentVoteImageIndex = (currentVoteImageIndex + 1) % voteImages.length;
            var img = document.getElementById('voteImage');
            if (img) {
                img.src = voteImages[currentVoteImageIndex] + '?t=' + Date.now();
            }
        }
        
        window.prevVoteImage = function() {
            currentVoteImageIndex = (currentVoteImageIndex - 1 + voteImages.length) % voteImages.length;
            var img = document.getElementById('voteImage');
            if (img) {
                img.src = voteImages[currentVoteImageIndex] + '?t=' + Date.now();
            }
        }

    </script>
    <script src="js/scriipt.js"></script>
</body>
</html>
